apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  # Headless: no ClusterIP, DNS returns individual Pod IPs
  # Gives each pod stable DNS: simplybyte-mysql-0.mysql, simplybyte-mysql-1.mysql
  clusterIP: None
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306